name: Sonar Analysis

on:
  push:
    branches:
      - "main"
      - "develop"
  pull_request:
    branches:
      - "main"
      - "develop"
  workflow_dispatch:

concurrency:
  group: sonar-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sonar-analysis:
    name: Sonar Analysis
    runs-on: ubuntu-latest

    env:
      SECRET_KEY: github-actions-secret-key
      DEBUG: "False"
      ALLOWED_HOSTS: localhost,127.0.0.1
      DB_ENGINE: django.db.backends.sqlite3
      DB_NAME: ":memory:"
      RABBITMQ_HOST: localhost
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      REDIS_HOST: localhost
      REDIS_PORT: "6379"
      REDIS_DB: "0"
      REDIS_PASSWORD: redissenha123

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt coverage ruff

      - name: Lint Python code
        run: python -m ruff check api_rest api_topicos manage.py

      - name: Django system check
        run: python manage.py check

      - name: Run tests with coverage
        run: |
          python -m coverage run --source=api_rest,api_topicos manage.py test
          python -m coverage xml -o coverage.xml

      - name: Analyze with SonarCloud
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
