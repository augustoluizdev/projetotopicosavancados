name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest

    env:
      SECRET_KEY: github-actions-secret-key
      DEBUG: "False"
      ALLOWED_HOSTS: localhost,127.0.0.1
      DB_ENGINE: django.db.backends.sqlite3
      DB_NAME: ":memory:"
      RABBITMQ_HOST: localhost
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      REDIS_HOST: localhost
      REDIS_PORT: "6379"
      REDIS_DB: "0"
      REDIS_PASSWORD: redissenha123
      CELERY_TASK_ALWAYS_EAGER: "True"

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt coverage

      - name: Run test suite with coverage
        run: coverage run -m pytest

      - name: Generate coverage XML
        run: coverage xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          if-no-files-found: error

  docker-ci:
    name: Docker CI
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Create Docker Compose env file
        run: cp .env.example .env

      - name: Build Docker Compose services
        run: docker compose build

  sonar-analysis:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs:
      - backend-ci

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: .

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Analyze with SonarCloud
        uses: SonarSource/sonarqube-scan-action@v8.1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=augustoluizdev_projetotopicosavancados
            -Dsonar.organization=augustoluizdev
            -Dsonar.python.coverage.reportPaths=coverage.xml
            -Dsonar.scanner.skipJreProvisioning=true
